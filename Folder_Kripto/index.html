<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoEngine JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>RWV CALCULATOR TEXT 2.0 </h2>
    
    <div class="form-group">
        <label for="cipher">Pilih Algoritma:</label>
        <select id="cipher" onchange="updateUI()">
            <option value="vigenere">Vigenere Cipher</option>
            <option value="affine">Affine Cipher</option>
            <option value="playfair">Playfair Cipher</option>
            <option value="hill">Hill Cipher (Matriks 2x2)</option>
            <option value="enigma">Enigma Cipher (1-Rotor)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="text">Pesan Teks (Plaintext / Ciphertext):</label>
        <textarea id="text" placeholder="Masukkan teks di sini..." required></textarea>
    </div>

    <div class="form-group" id="group_key_text">
        <label for="key_text">Kunci (Teks):</label>
        <input type="text" id="key_text" value="KUNCI" placeholder="Masukkan huruf alfabet">
        <small id="hint_key_text" class="hint-text"></small>
    </div>

    <div id="group_key_affine" style="display: none;">
        <div class="form-group">
            <label for="key_a">Nilai 'a' (Harus Koprima dengan 26):</label>
            <input type="number" id="key_a" value="5">
        </div>
        <div class="form-group">
            <label for="key_b">Nilai 'b' (Pergeseran):</label>
            <input type="number" id="key_b" value="8">
        </div>
    </div>

    <div class="btn-group">
        <button onclick="processCrypto('encrypt')" class="btn-encrypt">Enkripsi Teks</button>
        <button onclick="processCrypto('decrypt')" class="btn-decrypt">Dekripsi Teks</button>
    </div>

    <div class="result-box" id="result_container" style="display: none;">
        <label id="result_label">Hasil:</label>
        <h3 id="result_text"></h3>
    </div>

    <hr style="margin: 35px 0; border-color: #424242;">
    
    <h2 style="color: #2196f3; font-size: 20px;">RWV CALCULATOR FILE 2.0</h2>
    
    <div class="form-group">
        <label for="file_input">Pilih File (Gambar, Audio, Video, DB):</label>
        <input type="file" id="file_input" style="padding: 10px; background-color: #2c2c2c; border: 1px solid #424242; border-radius: 6px; color: #fff; width: 100%;">
    </div>

    <div class="form-group">
        <label for="file_key">Kunci Rahasia File (Teks):</label>
        <input type="text" id="file_key" value="KUNCIRAHASIA" placeholder="Masukkan kunci pengaman file">
    </div>

    <div class="btn-group">
        <button onclick="processFile('encrypt')" class="btn-encrypt" style="background-color: #2196f3; color: white;">Enkripsi File</button>
        <button onclick="processFile('decrypt')" class="btn-decrypt" style="background-color: #ff9800; color: white;">Dekripsi File</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
